    <!-- verticale : ch^V -->
    <line x1="315" y1="25" x2="315" y2="915" stroke-width="1.4"/>
    <!-- fleche sur la verticale -->
    <line x1="298" y1="845" x2="340" y2="845" stroke-width="1.2"/>
