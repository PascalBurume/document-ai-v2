    <text x="40" y="316" transform="rotate(90 40 316)">a<tspan dy="-5" font-size="10">H</tspan><tspan dy="9" font-size="10">R</tspan></text>
    <text x="46" y="416" transform="rotate(90 46 416)">a<tspan dy="-5" font-size="10">H</tspan></text>

    <!-- triangle rabattu -->
    <text x="392" y="72" transform="rotate(90 392 72)">L<tspan dy="-5" font-size="10">H'</tspan></text>
    <text x="458" y="76" transform="rotate(90 458 76)">K<tspan dy="-5" font-size="10">H'</tspan></text>
    <text x="366" y="160" transform="rotate(90 366 160)">M<tspan dy="-5" font-size="10">H'</tspan></text>

    <!-- projection verticale -->
    <text x="472" y="122" transform="rotate(90 472 122)">B<tspan dy="-5" font-size="10">V</tspan></text>
    <text x="548" y="166" transform="rotate(90 548 166)">K<tspan dy="-5" font-size="10">V</tspan></text>
    <text x="524" y="192" transform="rotate(90 524 192)">L<tspan dy="-5" font-size="10">V</tspan></text>
    <text x="508" y="170" transform="rotate(90 508 170)">x<tspan dy="-5" font-size="10">V</tspan></text>
    <text x="634" y="238" transform="rotate(90 634 238)">S<tspan dy="-5" font-size="10">V</tspan></text>
    <text x="586" y="280" transform="rotate(90 586 280)">C<tspan dy="-5" font-size="10">V</tspan></text>
    <text x="446" y="296" transform="rotate(90 446 296)">A<tspan dy="-5" font-size="10">V</tspan></text>
    <text x="466" y="262" transform="rotate(90 466 262)">M<tspan dy="-5" font-size="10">V</tspan></text>
    <text x="502" y="244" transform="rotate(90 502 244)">G<tspan dy="-5" font-size="10">V</tspan></text>
    <text x="684" y="236" transform="rotate(90 684 236)">p<tspan dy="-5" font-size="10">V</tspan></text>
