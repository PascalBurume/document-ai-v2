    <!-- bas de planche -->
    <text x="240" y="410" transform="rotate(90 240 410)">Ch<tspan dy="-5" font-size="10">H</tspan></text>
    <text x="284" y="404" transform="rotate(90 284 404)">H'</text>
    <text x="382" y="402" transform="rotate(90 382 402)">H</text>
    <text x="400" y="404" transform="rotate(90 400 404)">V</text>
    <text x="462" y="388" transform="rotate(90 462 388)">π<tspan dy="-5" font-size="10">V</tspan><tspan dy="5">ch</tspan><tspan dy="-5" font-size="10">V</tspan></text>
  </g>
</g></svg>