<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 720" width="460" height="720"><rect width="460" height="720" fill="#fff"/><g transform="translate(0 720) rotate(-90)">
  <rect width="720" height="460" fill="#fff"/>
  <g stroke="#111" fill="none" stroke-linecap="round" stroke-linejoin="round">

    <!-- plate frame -->
    <rect x="14" y="15" width="689" height="434" stroke-width="1.2"/>

    <!-- ligne de terre (verticale : la planche est en paysage) -->
    <line x1="389" y1="15" x2="391" y2="449" stroke-width="1"/>
    <!-- pi^V ch^V -->
    <line x1="459" y1="15" x2="461" y2="449" stroke-width="1"/>
    <!-- p^V (horizontale, passe par S^V) -->
    <line x1="232" y1="228" x2="702" y2="233" stroke-width="1"/>

    <!-- a^H : droite C^H x^H B^H, et a^H_R son rabattement -->
    <line x1="15" y1="452" x2="382" y2="17" stroke-width="1"/>
    <line x1="15" y1="334" x2="425" y2="17" stroke-width="1"/>
    <!-- a^V : droite B^V x^V C^V -->
    <line x1="386" y1="16" x2="700" y2="428" stroke-width="1"/>
    <!-- droite de construction A^V vers K^V -->
    <line x1="457" y1="289" x2="600" y2="70" stroke-width="0.9"/>
    <!-- obliques longues -->
    <line x1="300" y1="15" x2="200" y2="449" stroke-width="0.9"/>
    <line x1="345" y1="15" x2="255" y2="449" stroke-width="0.9"/>

    <!-- ===== projection horizontale : triangle A^H B^H C^H ===== -->
    <path d="M165 273 L283 134 L262 282 Z" stroke-width="2.2"/>
    <!-- polygone interieur -->
    <path d="M236 192 L264 174 L268 249 L262 282" stroke-width="2.2"/>
    <path d="M236 192 L239 228 L262 282" stroke-width="2.2"/>

    <!-- ===== projection verticale : A^V B^V S^V C^V ===== -->
    <path d="M457 289 L476 133 L628 231 L580 272 Z" stroke-width="2.2"/>
    <!-- diagonale A^V S^V en tirets longs -->
    <path d="M457 289 L628 231" stroke-width="1.6" stroke-dasharray="14 6"/>

    <!-- ===== triangle rabattu L^H' K^H' M^H' ===== -->
    <path d="M407 79 L454 81 L379 160 Z" stroke-width="2.2"/>

    <!-- rayons de rabattement (tirets longs) -->
    <path d="M454 81 L540 173" stroke-width="1.1" stroke-dasharray="14 6"/>
    <path d="M407 79 L518 195" stroke-width="1.1" stroke-dasharray="14 6"/>
    <path d="M379 160 L461 252" stroke-width="1.1" stroke-dasharray="14 6"/>
    <path d="M15 112 L240 197" stroke-width="1.1" stroke-dasharray="14 6"/>
    <path d="M109 259 L165 273" stroke-width="1.1" stroke-dasharray="14 6"/>

    <!-- lignes de rappel (horizontales ici) -->
    <g stroke-width="0.9" stroke-dasharray="5 4">
      <line x1="298" y1="111" x2="487" y2="111"/>
      <line x1="290" y1="134" x2="470" y2="133"/>
      <line x1="272" y1="174" x2="535" y2="173"/>
      <line x1="243" y1="192" x2="514" y2="195"/>
      <line x1="176" y1="272" x2="574" y2="272"/>
      <line x1="274" y1="249" x2="456" y2="252"/>
      <line x1="268" y1="283" x2="452" y2="289"/>
    </g>
  </g>

  <g font-family="Georgia, serif" font-size="14" fill="#111">
    <text x="686" y="40" font-size="17" transform="rotate(90 686 40)">E 101</text>

