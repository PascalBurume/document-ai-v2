    <path d="M143 394 L202 514 L302 488 Z" stroke-width="1.3"/>

    <!-- lignes de rappel -->
    <g stroke-width="1.3" stroke-dasharray="9 6">
      <line x1="143" y1="163" x2="143" y2="391"/>
      <line x1="201" y1="116" x2="202" y2="511"/>
      <line x1="302" y1="66" x2="302" y2="486"/>
      <line x1="204" y1="116" x2="270" y2="216"/>
      <line x1="304" y1="66" x2="348" y2="141"/>
    </g>

