<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 590" width="720" height="590">
  <rect width="720" height="590" fill="#fff"/>
  <g stroke="#111" fill="none" stroke-linecap="round" stroke-linejoin="round">

    <!-- nouvelle ligne de terre L'T' (V / H') -->
    <line x1="36" y1="236" x2="379" y2="11" stroke-width="1.4"/>

    <!-- triangle rabattu A^H' B^H C^H' -->
    <path d="M143 159 L350 145" stroke-width="1.4"/>
    <path d="M143 159 L271 220 L350 145" stroke-width="2.6"/>

    <!-- ligne de terre LT (V / H) -->
