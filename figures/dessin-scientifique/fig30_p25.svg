    <text x="63" y="232" transform="rotate(-33 63 232)">H'</text>

    <text x="129" y="145">A<tspan dy="-5" font-size="10">V</tspan></text>
    <text x="147" y="144">A<tspan dy="-5" font-size="10">H'</tspan></text>
    <text x="190" y="113">B<tspan dy="-5" font-size="10">V</tspan></text>
    <text x="289" y="56">C<tspan dy="-5" font-size="10">V</tspan></text>
    <text x="358" y="140">C<tspan dy="-5" font-size="10">H'</tspan></text>
    <text x="263" y="240">B<tspan dy="-5" font-size="10">H</tspan></text>

    <text x="24" y="390">LT V</text>
    <text x="45" y="410">H</text>
    <text x="120" y="388">A<tspan dy="-5" font-size="10">H</tspan></text>
    <text x="200" y="531">B<tspan dy="-5" font-size="10">H</tspan></text>
    <text x="304" y="499">C<tspan dy="-5" font-size="10">H</tspan></text>

