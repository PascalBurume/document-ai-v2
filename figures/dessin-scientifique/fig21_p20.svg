<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 950" width="720" height="950">
  <rect width="720" height="950" fill="#fff"/>
  <g stroke="#111" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- ligne de terre pi^V -->
    <line x1="4" y1="245" x2="716" y2="242" stroke-width="1.6"/>

    <!-- ticks on the ligne de terre : A^V, B^V, C^V, I^V -->
    <g stroke-width="1.8">
      <line x1="100" y1="238" x2="100" y2="262"/>
      <line x1="305" y1="238" x2="305" y2="266"/>
      <line x1="655" y1="238" x2="655" y2="262"/>
      <line x1="353" y1="244" x2="353" y2="268"/>
    </g>

    <!-- ===== projection horizontale ===== -->
    <g stroke-width="1.7">
      <line x1="113" y1="620" x2="317" y2="705"/>   <!-- A^h B^h -->
      <line x1="317" y1="705" x2="650" y2="460"/>   <!-- B^h C^h, carries I^h -->
      <line x1="113" y1="620" x2="650" y2="460"/>   <!-- A^h C^h -->
      <line x1="113" y1="620" x2="195" y2="468"/>   <!-- A^h S^h -->
      <line x1="195" y1="468" x2="327" y2="350"/>   <!-- S^h S' -->
      <line x1="195" y1="468" x2="547" y2="907"/>   <!-- S^h I^h S2^h -->
      <line x1="113" y1="620" x2="30" y2="828"/>    <!-- A^h S1^h -->
    </g>

    <!-- lignes de rappel -->
    <g stroke-width="1.2" stroke-dasharray="14 8">
      <line x1="100" y1="245" x2="113" y2="620"/>
      <line x1="305" y1="245" x2="317" y2="705"/>
      <line x1="655" y1="244" x2="650" y2="460"/>
      <line x1="188" y1="90" x2="195" y2="468"/>
      <line x1="353" y1="245" x2="363" y2="672"/>
    </g>
  </g>

  <g font-family="Georgia, serif" font-size="15" fill="#111">
    <text x="78" y="236">A<tspan dy="-5" font-size="10">V</tspan></text>
    <text x="292" y="236">B<tspan dy="-5" font-size="10">V</tspan></text>
    <text x="646" y="236">C<tspan dy="-5" font-size="10">V</tspan></text>
    <text x="348" y="278">I<tspan dy="-5" font-size="10">V</tspan></text>
    <text x="156" y="52">S<tspan dy="-5" font-size="10">V</tspan></text>
    <text x="512" y="240">π<tspan dy="-5" font-size="10">V</tspan></text>

    <text x="72" y="626">A<tspan dy="-5" font-size="10">h</tspan></text>
    <text x="308" y="730">B<tspan dy="-5" font-size="10">h</tspan></text>
    <text x="660" y="458">C<tspan dy="-5" font-size="10">h</tspan></text>
    <text x="160" y="472">S<tspan dy="-5" font-size="10">h</tspan></text>
    <text x="372" y="678">I<tspan dy="-5" font-size="10">h</tspan></text>
    <text x="320" y="348">S'</text>
    <text x="14" y="856">S<tspan dy="-5" font-size="10">h</tspan><tspan dy="9" font-size="10">1</tspan></text>
    <text x="562" y="922">S<tspan dy="-5" font-size="10">h</tspan><tspan dy="9" font-size="10">2</tspan></text>
  </g>
</svg>
