<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 1150" width="720" height="1150">
  <rect width="720" height="1150" fill="#fff"/>
  <g stroke="#111" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- plate frame -->
    <path d="M30 46 L706 22 L704 1112 L44 1120 Z" stroke-width="1.2"/>

    <!-- reference lines -->
    <line x1="30" y1="272" x2="704" y2="249" stroke-width="1.1"/>   <!-- b^V -->
    <line x1="30" y1="376" x2="704" y2="348" stroke-width="1.1"/>   <!-- a^HV pi^V ch^HV : ligne de terre -->
    <line x1="30" y1="482" x2="704" y2="456" stroke-width="1.1"/>   <!-- b^H -->

    <!-- long construction obliques -->
    <line x1="137" y1="47" x2="705" y2="443" stroke-width="1"/>
    <line x1="347" y1="27" x2="702" y2="620" stroke-width="1"/>
    <line x1="32" y1="795" x2="705" y2="240" stroke-width="1"/>
    <path d="M252 134 L357 380 L705 1112" stroke-width="1"/>
    <line x1="252" y1="603" x2="57" y2="1100" stroke-width="1"/>
    <line x1="420" y1="590" x2="137" y2="1124" stroke-width="1"/>
    <line x1="345" y1="328" x2="405" y2="312" stroke-width="1"/>

    <!-- rappel verticals continued below as solid traces -->
    <line x1="252" y1="603" x2="262" y2="1122" stroke-width="1"/>
    <line x1="420" y1="590" x2="424" y2="1122" stroke-width="1"/>

    <!-- ===== projection verticale : A^HV B^V C^V D^V ===== -->
    <path d="M252 134 L419 130 L345 328 Z" stroke-width="2.2"/>
    <path d="M252 134 L213 369 L345 328" stroke-width="2.2"/>
    <path d="M419 130 L213 369" stroke-width="1.8" stroke-dasharray="9 5"/>

    <!-- ===== projection horizontale : A^HV B^H C^H D^H ===== -->
    <path d="M213 369 L252 603 L420 590 Z" stroke-width="2.2"/>
    <path d="M213 369 L345 546 L252 603" stroke-width="1.8" stroke-dasharray="9 5"/>
    <path d="M345 546 L420 590" stroke-width="1.8" stroke-dasharray="9 5"/>

    <!-- lignes de rappel -->
    <g stroke-width="0.9" stroke-dasharray="5 4">
      <line x1="252" y1="134" x2="252" y2="603"/>   <!-- B -->
      <line x1="419" y1="130" x2="420" y2="590"/>   <!-- C -->
      <line x1="345" y1="328" x2="345" y2="546"/>   <!-- D -->
      <line x1="357" y1="380" x2="357" y2="512"/>   <!-- K -->
      <line x1="430" y1="275" x2="428" y2="478"/>   <!-- D' -->
    </g>

    <!-- arrow under ch^HV -->
    <line x1="126" y1="370" x2="126" y2="392" stroke-width="1"/>
    <path d="M121 385 L126 393 L131 385" stroke-width="1"/>
  </g>

  <g font-family="Georgia, serif" font-size="15" fill="#111">
    <text x="48" y="62" font-size="19">E 93</text>

    <text x="30" y="266">b<tspan dy="-5" font-size="10">V</tspan></text>
    <text x="30" y="472">b<tspan dy="-5" font-size="10">H</tspan></text>
    <text x="24" y="370">a<tspan dy="-5" font-size="10">HV</tspan><tspan dy="5"> π</tspan><tspan dy="-5" font-size="10">V</tspan><tspan dy="5"> ch</tspan><tspan dy="-5" font-size="10">HV</tspan></text>

    <text x="170" y="364">A<tspan dy="-5" font-size="10">HV</tspan></text>
    <text x="246" y="122">B<tspan dy="-5" font-size="10">V</tspan></text>
    <text x="426" y="124">C<tspan dy="-5" font-size="10">V</tspan></text>
    <text x="348" y="342">D<tspan dy="-5" font-size="10">V</tspan></text>
    <text x="366" y="390">K<tspan dy="-5" font-size="10">V</tspan></text>
    <text x="400" y="288">D'</text>
    <text x="448" y="338">K'</text>

    <text x="228" y="616">B<tspan dy="-5" font-size="10">H</tspan></text>
    <text x="428" y="596">C<tspan dy="-5" font-size="10">H</tspan></text>
    <text x="326" y="570">D<tspan dy="-5" font-size="10">H</tspan></text>
    <text x="360" y="512">K<tspan dy="-5" font-size="10">H</tspan></text>

    <text x="258" y="716">B<tspan dy="-5" font-size="10">H</tspan><tspan dy="9" font-size="10">R</tspan></text>
    <text x="426" y="700">C<tspan dy="-5" font-size="10">H</tspan><tspan dy="9" font-size="10">R</tspan></text>

    <text x="656" y="1002">P<tspan dy="-5" font-size="10">V</tspan></text>
    <text x="672" y="1046">d<tspan dy="-5" font-size="10">V</tspan></text>
  </g>
</svg>
