<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 540" width="720" height="540">
  <rect width="720" height="540" fill="#fff"/>
  <g stroke="#111" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- plate frame -->
    <path d="M10 16 L700 8 L694 528 L30 522 Z" stroke-width="1.2"/>

    <!-- ===== projection horizontale : quadrilatere A D C B ===== -->
    <path d="M85 185 L238 109 L269 278 L113 357 Z" stroke-width="1.6"/>
    <g stroke-width="1.2">
      <line x1="85" y1="185" x2="269" y2="278"/>
      <line x1="238" y1="109" x2="113" y2="357"/>
    </g>
    <!-- dash-dot : A^H O' -->
    <path d="M85 185 L129 325" stroke-width="1.2" stroke-dasharray="14 4 2 4"/>
    <!-- marques d'egalite -->
    <g stroke-width="1.4">
      <line x1="205" y1="158" x2="216" y2="170"/>
      <line x1="149" y1="268" x2="160" y2="280"/>
      <line x1="155" y1="272" x2="166" y2="284"/>
      <line x1="105" y1="256" x2="118" y2="268"/>
      <line x1="118" y1="256" x2="105" y2="268"/>
    </g>

    <!-- ===== projection verticale ===== -->
    <path d="M535 111 L635 184 L548 349 L448 274 Z" stroke-width="2.2"/>
