      <line x1="572" y1="176" x2="574" y2="192"/>
      <line x1="579" y1="176" x2="581" y2="192"/>
    </g>

    <!-- lignes de rappel horizontales -->
    <g stroke-width="1" stroke-dasharray="9 5">
      <line x1="245" y1="109" x2="530" y2="111"/>
      <line x1="92" y1="185" x2="630" y2="184"/>
      <line x1="186" y1="233" x2="538" y2="233"/>
      <line x1="276" y1="278" x2="443" y2="274"/>
      <line x1="120" y1="357" x2="543" y2="350"/>
    </g>
  </g>

  <g font-family="Georgia, serif" font-size="15" fill="#111">
    <text x="648" y="42" font-size="17">E 73</text>

    <text x="66" y="182">A<tspan dy="-5" font-size="10">H</tspan></text>
    <text x="232" y="102">D<tspan dy="-5" font-size="10">H</tspan></text>
    <text x="266" y="294">C<tspan dy="-5" font-size="10">H</tspan></text>
    <text x="96" y="368">B<tspan dy="-5" font-size="10">H</tspan></text>
    <text x="152" y="240">O<tspan dy="-5" font-size="10">H</tspan></text>
    <text x="130" y="332">O'</text>

    <text x="538" y="104">D<tspan dy="-5" font-size="10">V</tspan></text>
    <text x="640" y="188">A<tspan dy="-5" font-size="10">V</tspan></text>
    <text x="428" y="290">C<tspan dy="-5" font-size="10">V</tspan></text>
    <text x="550" y="364">B<tspan dy="-5" font-size="10">V</tspan></text>
    <text x="546" y="242">O<tspan dy="-5" font-size="10">V</tspan></text>
