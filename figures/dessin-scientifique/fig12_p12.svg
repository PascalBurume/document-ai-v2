    <!-- plate frame -->
    <path d="M12 14 L706 12 L708 508 L14 510 Z" stroke-width="1.2"/>

    <!-- long traces (thin) -->
    <line x1="14" y1="193" x2="706" y2="208" stroke-width="1"/>
    <line x1="22" y1="20" x2="700" y2="470" stroke-width="1"/>
    <line x1="95" y1="506" x2="700" y2="88" stroke-width="1"/>
