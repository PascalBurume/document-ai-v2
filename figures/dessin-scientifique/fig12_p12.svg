    <line x1="14" y1="240" x2="706" y2="440" stroke-width="1"/>

    <!-- ===== projection horizontale : triangle A B C ===== -->
    <path d="M357 67 L212 282 L367 282 Z" stroke-width="2.2"/>
    <line x1="212" y1="282" x2="321" y2="353" stroke-width="2.2"/>
    <line x1="321" y1="353" x2="367" y2="282" stroke-width="2.2"/>
