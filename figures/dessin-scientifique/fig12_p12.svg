    <!-- ===== projection verticale : triangle A B C ===== -->
    <path d="M425 66 L427 282 L577 285 Z" stroke-width="2.2"/>
    <line x1="427" y1="282" x2="470" y2="354" stroke-width="2.2"/>
    <line x1="470" y1="354" x2="577" y2="285" stroke-width="2.2"/>
    <line x1="427" y1="282" x2="431" y2="506" stroke-width="2.2"/>
    <line x1="577" y1="285" x2="700" y2="455" stroke-width="2.2"/>
    <path d="M425 66 L470 354" stroke-width="1.4" stroke-dasharray="14 6"/>

