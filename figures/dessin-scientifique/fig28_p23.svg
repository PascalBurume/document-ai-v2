<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 1010" width="720" height="1010">
  <rect width="720" height="1010" fill="#fff"/>
  <g stroke="#111" fill="none" stroke-linecap="round" stroke-linejoin="round">

    <!-- droite verticale ch^H / ch^V, flechee vers le bas -->
    <path d="M417 33 L410 968" stroke-width="1.6"/>
    <path d="M403 952 L410 970 L417 951" stroke-width="1.4"/>

    <!-- petite fleche horizontale en haut -->
    <path d="M397 85 L441 85" stroke-width="1.2"/>
    <path d="M431 79 L443 85 L431 91" stroke-width="1.2"/>

    <!-- ligne de terre : pi^V a^V -->
    <line x1="37" y1="346" x2="690" y2="330" stroke-width="1.4"/>
    <!-- a^H -->
    <line x1="33" y1="569" x2="686" y2="550" stroke-width="1.4"/>

    <!-- b^V : oblique montante -->
    <line x1="37" y1="506" x2="647" y2="53" stroke-width="1.7"/>

    <!-- b^H : oblique descendante passant par B^H -->
    <path d="M37 408 L256 566 L414 675 L673 859" stroke-width="1.7"/>

    <!-- iota_R^H : oblique passant par A^H, Q_R^H, B_R^H -->
    <path d="M288 444 L413 560 L482 623 L532 668 L676 831" stroke-width="1.5"/>
    <path d="M583 722 L597 736 L578 738" stroke-width="1.3"/>

    <!-- droite de rabattement montante (p_R^H) -->
    <path d="M131 983 L299 807 L482 623 L700 400" stroke-width="1.4"/>

    <!-- ligne de rappel -->
    <line x1="263" y1="340" x2="263" y2="566" stroke-width="1" stroke-dasharray="5 4"/>

    <!-- Q^H - Q_R^H : trait fort -->
    <line x1="413" y1="627" x2="482" y2="623" stroke-width="2.6"/>

    <!-- B^H - B_R^H : tirets -->
    <line x1="417" y1="673" x2="532" y2="668" stroke-width="1.3" stroke-dasharray="12 6"/>

    <!-- P_R^H - P^H : tirets flechés -->
    <line x1="300" y1="803" x2="404" y2="795" stroke-width="1.1" stroke-dasharray="12 6"/>
    <path d="M395 789 L408 795 L396 801" stroke-width="1.1"/>
  </g>

  <g font-family="Georgia, serif" font-size="15" fill="#111">
    <text x="55" y="178" font-size="18">( g )</text>

    <text x="428" y="63">Ch<tspan dy="-5" font-size="10">H</tspan></text>
    <text x="625" y="55">b<tspan dy="-5" font-size="10">V</tspan></text>
    <text x="433" y="236">B<tspan dy="-5" font-size="10">V</tspan></text>
    <text x="383" y="281">Q<tspan dy="-5" font-size="10">V</tspan></text>
    <text x="427" y="329">A<tspan dy="-5" font-size="10">V</tspan><tspan dy="5"> Ch</tspan><tspan dy="-5" font-size="10">V</tspan></text>
    <text x="614" y="329">π<tspan dy="-5" font-size="10">V</tspan><tspan dy="5"> a</tspan><tspan dy="-5" font-size="10">V</tspan></text>

    <text x="311" y="461">ι<tspan dy="-5" font-size="10">H</tspan><tspan dy="9" font-size="10">R</tspan></text>

    <text x="427" y="549">A<tspan dy="-5" font-size="10">H</tspan></text>
    <text x="643" y="538">a<tspan dy="-5" font-size="10">H</tspan></text>

    <text x="377" y="630">Q<tspan dy="-5" font-size="10">H</tspan></text>
    <text x="493" y="632">Q<tspan dy="-5" font-size="10">H</tspan><tspan dy="9" font-size="10">R</tspan></text>
    <text x="418" y="663">B<tspan dy="-5" font-size="10">H</tspan></text>
    <text x="536" y="664">B<tspan dy="-5" font-size="10">H</tspan><tspan dy="9" font-size="10">R</tspan></text>

    <text x="269" y="806">P<tspan dy="-5" font-size="10">H</tspan><tspan dy="9" font-size="10">R</tspan></text>
    <text x="427" y="793">P<tspan dy="-5" font-size="10">H</tspan></text>
    <text x="654" y="833">b<tspan dy="-5" font-size="10">H</tspan></text>

    <text x="119" y="955">P<tspan dy="-5" font-size="10">H</tspan><tspan dy="9" font-size="10">R</tspan></text>
    <text x="417" y="940">B<tspan dy="-5" font-size="10">HV</tspan></text>
    <text x="440" y="962">ι<tspan dy="-5" font-size="10">HV</tspan></text>
  </g>
</svg>
