      <line x1="408" y1="146" x2="404" y2="633"/>
      <line x1="456" y1="146" x2="452" y2="600"/>
      <line x1="481" y1="147" x2="478" y2="541"/>
    </g>

    <!-- arrow at the foot of the axis -->
    <path d="M182 990 L136 990 M144 985 L136 990 L144 995" stroke-width="1.5"/>
  </g>

