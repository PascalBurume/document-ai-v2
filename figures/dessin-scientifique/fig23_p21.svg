    <text x="180" y="658">B<tspan dy="-5" font-size="10">H</tspan></text>
    <text x="380" y="660">B<tspan dy="-5" font-size="10">H</tspan><tspan dy="9" font-size="10">R</tspan></text>
    <text x="178" y="782">A<tspan dy="-5" font-size="10">H</tspan></text>
