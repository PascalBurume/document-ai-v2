    <text x="230" y="126">Ch<tspan dy="-5" font-size="10">V</tspan></text>
    <text x="668" y="136">π<tspan dy="-5" font-size="10">V</tspan></text>
    <text x="370" y="128">B<tspan dy="-5" font-size="10">V</tspan><tspan dy="9" font-size="10">R</tspan></text>
    <text x="442" y="126">I<tspan dy="-5" font-size="10">V</tspan><tspan dy="9" font-size="10">R</tspan></text>
    <text x="486" y="128">C<tspan dy="-5" font-size="10">V</tspan><tspan dy="9" font-size="10">R</tspan></text>

    <text x="190" y="262">D<tspan dy="-5" font-size="10">V</tspan></text>
    <text x="190" y="348">B<tspan dy="-5" font-size="10">V</tspan></text>
    <text x="140" y="406">I<tspan dy="-5" font-size="10">V</tspan></text>
    <text x="190" y="446">C<tspan dy="-5" font-size="10">V</tspan></text>

    <text x="182" y="526">C<tspan dy="-5" font-size="10">H</tspan></text>
    <text x="486" y="534">C<tspan dy="-5" font-size="10">H</tspan><tspan dy="9" font-size="10">R</tspan></text>
    <text x="142" y="592">I<tspan dy="-5" font-size="10">H</tspan></text>
