<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 1070" width="720" height="1070">
  <rect width="720" height="1070" fill="#fff"/>
  <g stroke="#111" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- axis Ch^V .. Ch^H (vertical) -->
    <line x1="184" y1="32" x2="166" y2="1058" stroke-width="1.8"/>
    <!-- pi^V -->
    <line x1="45" y1="139" x2="706" y2="150" stroke-width="1.6"/>

    <!-- the two obliques -->
    <line x1="35" y1="835" x2="706" y2="467" stroke-width="1.4"/>
    <line x1="245" y1="1055" x2="605" y2="265" stroke-width="1.4"/>
    <line x1="655" y1="888" x2="700" y2="1012" stroke-width="1.4"/>

    <!-- I^H : heavy horizontal to the crossing point -->
    <line x1="172" y1="603" x2="452" y2="605" stroke-width="2.6"/>

    <!-- rabattement horizontals (dashed) -->
    <g stroke-width="1.8" stroke-dasharray="14 8">
      <line x1="174" y1="546" x2="478" y2="541"/>
      <line x1="172" y1="631" x2="405" y2="633"/>
      <line x1="177" y1="926" x2="312" y2="930"/>
    </g>

    <!-- rappels (dashed verticals) -->
