    <text x="44" y="254" transform="rotate(90 44 254)">φ<tspan dy="-5" font-size="10">HV</tspan></text>

    <text x="177" y="142" transform="rotate(90 177 142)">A<tspan dy="-5" font-size="10">H</tspan></text>
    <text x="316" y="142" transform="rotate(90 316 142)">B<tspan dy="-5" font-size="10">H</tspan></text>
    <text x="399" y="145" transform="rotate(90 399 145)">M<tspan dy="-5" font-size="10">H'</tspan></text>
    <text x="487" y="145" transform="rotate(90 487 145)">B<tspan dy="-5" font-size="10">V</tspan></text>
    <text x="565" y="144" transform="rotate(90 565 144)">A<tspan dy="-5" font-size="10">V</tspan></text>
    <text x="570" y="190" transform="rotate(90 570 190)">A<tspan dy="-5" font-size="10">H'</tspan></text>

    <text x="367" y="30" transform="rotate(90 367 30)">N<tspan dy="-5" font-size="10">H'</tspan></text>
