<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 470 720" width="470" height="720"><rect width="470" height="720" fill="#fff"/><g transform="translate(0 720) rotate(-90)">
  <rect width="720" height="470" fill="#fff"/>
  <g stroke="#111" fill="none" stroke-linecap="round" stroke-linejoin="round">

    <!-- ligne de terre du systeme prime (V au-dessus, H' au-dessous) -->
