    <!-- seconde ligne horizontale -->
    <line x1="32" y1="249" x2="659" y2="258" stroke-width="1.8"/>
    <!-- ligne quasi verticale (LT du profil : H | V) -->
    <line x1="234" y1="20" x2="213" y2="455" stroke-width="1.8"/>

    <!-- traces obliques du plan phi (legerement courbes sur le trace) -->
    <path d="M355 25 Q 470 205 583 450" stroke-width="1.8"/>
    <path d="M450 15 Q 551 152 667 401" stroke-width="1.8"/>

    <!-- lignes de rappel -->
