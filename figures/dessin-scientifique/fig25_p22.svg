    <text x="68" y="334">π<tspan dy="-5" font-size="10">v</tspan><tspan dy="5">ch</tspan><tspan dy="-5" font-size="10">v</tspan><tspan dy="5">d</tspan><tspan dy="-5" font-size="10">v</tspan><tspan dy="9" font-size="10">R</tspan></text>

    <text x="252" y="68">d<tspan dy="-5" font-size="10">hv</tspan></text>
    <text x="479" y="90">p<tspan dy="-5" font-size="10">hv</tspan></text>

    <text x="245" y="173">A<tspan dy="-5" font-size="10">v</tspan></text>
    <text x="236" y="376">B<tspan dy="-5" font-size="10">v</tspan></text>
    <text x="282" y="320">M<tspan dy="-5" font-size="10">v</tspan><tspan dy="9" font-size="10">R</tspan></text>
    <text x="479" y="319">N<tspan dy="-5" font-size="10">v</tspan></text>
    <text x="576" y="310">P<tspan dy="-5" font-size="10">v</tspan><tspan dy="9" font-size="10">R</tspan></text>
    <text x="485" y="435">M<tspan dy="-5" font-size="10">v</tspan></text>

    <text x="64" y="588">d<tspan dy="-5" font-size="10">h</tspan><tspan dy="9" font-size="10">R</tspan></text>
    <text x="234" y="546">B<tspan dy="-5" font-size="10">h</tspan></text>
    <text x="272" y="534">B<tspan dy="-5" font-size="10">h</tspan><tspan dy="9" font-size="10">R</tspan></text>
    <text x="473" y="528">A<tspan dy="-5" font-size="10">h</tspan><tspan dy="9" font-size="10">R</tspan></text>
    <text x="469" y="658">M<tspan dy="-5" font-size="10">h</tspan></text>
    <text x="231" y="808">A<tspan dy="-5" font-size="10">h</tspan></text>
    <text x="467" y="783">N<tspan dy="-5" font-size="10">h</tspan><tspan dy="9" font-size="10">R</tspan></text>
    <text x="522" y="765">N<tspan dy="-5" font-size="10">h</tspan></text>
    <text x="624" y="746">P<tspan dy="-5" font-size="10">h</tspan><tspan dy="9" font-size="10">R</tspan></text>
    <text x="307" y="884">M<tspan dy="-5" font-size="10">h</tspan><tspan dy="9" font-size="10">R</tspan></text>
  </g>
