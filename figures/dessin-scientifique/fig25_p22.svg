<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 950" width="720" height="950">
  <rect width="720" height="950" fill="#fff"/>
  <g stroke="#111" fill="none" stroke-linecap="round" stroke-linejoin="round">

    <!-- ligne de terre / trace : pi^v ch^v d_R^v -->
    <line x1="63" y1="344" x2="717" y2="317" stroke-width="1.2"/>

    <!-- les deux droites verticales d^hv et p^hv (projections confondues) -->
    <path d="M248 22 L220 908" stroke-width="1.8"/>
    <path d="M476 24 L454 895" stroke-width="1.8"/>

    <!-- A^V -> M^V (projection verticale) -->
    <path d="M243 187 L464 415" stroke-width="1.6"/>

    <!-- la droite oblique passant par B^h et N_R^h -->
    <path d="M63 393 L228 562 L460 797 L596 913" stroke-width="1.6"/>
    <!-- fleche de sens portee par cette droite -->
    <path d="M125 447 L136 429 L138 446" stroke-width="1.4"/>

    <!-- d_R^h : trace rabattue -->
    <path d="M20 614 L228 562 L463 505 L706 443" stroke-width="1.6"/>

    <!-- A^h -> A_R^h -> P_R^V -->
    <path d="M229 784 L463 505 L632 319 L697 253" stroke-width="1.6"/>

    <!-- A^h -> M^h -->
    <path d="M229 784 L460 656" stroke-width="1.6"/>

    <!-- M^h -> M_R^h -->
    <path d="M460 656 L302 838 L222 935" stroke-width="1.6"/>

    <!-- p_R^h : trace rabattue passant par M_R^h et N_R^h -->
    <path d="M24 912 L302 838 L460 797 L706 722" stroke-width="1.6"/>

    <!-- lignes de rappel -->
    <g stroke-width="0.9" stroke-dasharray="5 4">
      <path d="M314 332 L302 838"/>
      <path d="M379 331 L366 696"/>
    </g>
  </g>

  <g font-family="Georgia, serif" font-size="15" fill="#111">
