<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 530 720" width="530" height="720"><rect width="530" height="720" fill="#fff"/><g transform="translate(0 720) rotate(-90)">
  <rect width="720" height="530" fill="#fff"/>
  <g stroke="#111" fill="none" stroke-linecap="round" stroke-linejoin="round">

    <!-- ligne de terre horizontale : ch^h / d^hv -->
    <line x1="30" y1="201" x2="716" y2="217" stroke-width="1.6"/>

    <!-- droite verticale : M^v ch^v ... p_R^h d_R^v pi^v -->
