    <!-- d_R^h -->
    <line x1="33" y1="413" x2="328" y2="12" stroke-width="1.8"/>
    <!-- p_R^h -->
    <line x1="65" y1="505" x2="417" y2="42" stroke-width="1.8"/>

    <!-- fleche a gauche sur la ligne de terre -->
    <path d="M73 218 L72 178" stroke-width="1.2"/>
    <path d="M66 193 L72 177 L79 193" stroke-width="1.2"/>

