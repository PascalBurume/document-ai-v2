    <text x="157" y="174" transform="rotate(90 157 174)">N<tspan dy="-5" font-size="10">h</tspan></text>
    <text x="168" y="381" transform="rotate(90 168 381)">N<tspan dy="-5" font-size="10">h</tspan><tspan dy="9" font-size="10">R</tspan></text>
    <text x="241" y="214" transform="rotate(90 241 214)">A<tspan dy="-5" font-size="10">h</tspan></text>
    <text x="291" y="218" transform="rotate(90 291 218)">M<tspan dy="-5" font-size="10">h</tspan></text>

    <text x="326" y="35" transform="rotate(90 326 35)">d<tspan dy="-5" font-size="10">h</tspan><tspan dy="9" font-size="10">R</tspan></text>
    <text x="397" y="73" transform="rotate(90 397 73)">p<tspan dy="-5" font-size="10">h</tspan><tspan dy="9" font-size="10">R</tspan></text>

    <text x="409" y="185" transform="rotate(90 409 185)">N<tspan dy="-5" font-size="10">v</tspan></text>
    <text x="484" y="226" transform="rotate(90 484 226)">B<tspan dy="-5" font-size="10">v</tspan></text>
    <text x="568" y="224" transform="rotate(90 568 224)">M<tspan dy="-5" font-size="10">v</tspan><tspan dy="5"> ch</tspan><tspan dy="-5" font-size="10">v</tspan></text>
    <text x="622" y="219" transform="rotate(90 622 219)">A<tspan dy="-5" font-size="10">v</tspan></text>
    <text x="674" y="217" transform="rotate(90 674 217)">d<tspan dy="-5" font-size="10">hv</tspan></text>

    <text x="565" y="414" transform="rotate(90 565 414)">p<tspan dy="-5" font-size="10">h</tspan><tspan dy="9" font-size="10">R</tspan><tspan dy="-4"> d</tspan><tspan dy="-5" font-size="10">v</tspan><tspan dy="9" font-size="10">R</tspan><tspan dy="-4"> π</tspan><tspan dy="-5" font-size="10">v</tspan></text>

