      <line x1="281" y1="895" x2="385" y2="791"/>
      <line x1="280" y1="906" x2="389" y2="796"/>
    </g>
    <path d="M310 693 L394 802 L279 908" stroke-width="1.2"/>

    <!-- petits reperes de points -->
    <g stroke-width="1.4">
      <line x1="474" y1="712" x2="474" y2="730"/>
      <line x1="474" y1="760" x2="474" y2="778"/>
      <line x1="393" y1="758" x2="393" y2="776"/>
      <line x1="424" y1="836" x2="424" y2="854"/>
    </g>
  </g>

