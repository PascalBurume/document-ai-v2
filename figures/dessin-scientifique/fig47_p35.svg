<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 1130" width="720" height="1130">
  <rect width="720" height="1130" fill="#fff"/>
  <g stroke="#111" fill="none" stroke-linecap="round" stroke-linejoin="round">

    <!-- cadre de l'epure (trace a main levee) -->
    <path d="M27 34 Q 300 12 697 58 L 703 1108 Q 360 1128 33 1112 Z" stroke-width="1.2"/>

    <!-- ligne de terre (V au-dessus, H au-dessous) -->
    <line x1="27" y1="386" x2="700" y2="412" stroke-width="2.2"/>
    <!-- m^V : courbe surbaissee au-dessus de la LT -->
    <path d="M23 377 Q 350 348 693 379" stroke-width="1"/>
    <!-- horizontale du plan horizontal, flechee a droite -->
    <line x1="27" y1="668" x2="702" y2="684" stroke-width="1"/>
    <path d="M690 678 L702 684 L690 690" stroke-width="1"/>
    <!-- m^H : horizontale basse -->
    <line x1="27" y1="815" x2="706" y2="803" stroke-width="1.6"/>
    <!-- verticale du cadre interieur -->
    <line x1="274" y1="16" x2="300" y2="1120" stroke-width="1"/>

    <!-- faisceau a 135 deg (montant vers la droite) -->
    <g stroke-width="1">
      <line x1="27" y1="722" x2="700" y2="134"/>
      <line x1="30" y1="1038" x2="700" y2="358"/>
      <line x1="30" y1="1113" x2="700" y2="420"/>
      <line x1="33" y1="1120" x2="540" y2="675"/>
    </g>
    <!-- faisceau a 45 deg (descendant vers la droite) -->
    <g stroke-width="1">
      <line x1="19" y1="276" x2="700" y2="957"/>
      <line x1="22" y1="341" x2="700" y2="1019"/>
      <line x1="27" y1="390" x2="700" y2="1097"/>
    </g>

    <!-- m^V : oblique raide -->
    <line x1="698" y1="64" x2="330" y2="1100" stroke-width="1"/>
    <!-- prolongement mince de la droite S^V B^V -->
    <line x1="510" y1="30" x2="180" y2="960" stroke-width="1"/>

    <!-- ===== projection verticale : triangle A^V S^V B^V + M^V ===== -->
    <path d="M211 392 L478 120 L381 395" stroke-width="2.4"/>
    <path d="M478 120 L306 391" stroke-width="2.4"/>
    <path d="M211 392 L381 395" stroke-width="2.4"/>

    <!-- ===== projection horizontale ===== -->
    <path d="M205 458 L485 637 L457 731 L310 693 Z" stroke-width="2.4"/>
    <!-- A^H M^H C^H alignes -->
    <path d="M310 693 L394 895" stroke-width="2.4"/>
    <path d="M310 693 L279 908 L394 895 L457 731" stroke-width="2.4"/>

    <!-- rabattement en trait interrompu fort -->
    <path d="M310 693 L485 640" stroke-width="2.2" stroke-dasharray="16 8"/>
    <path d="M207 462 L390 672" stroke-width="1.2" stroke-dasharray="10 6"/>

    <!-- lignes de rappel -->
    <g stroke-width="1.2" stroke-dasharray="9 6">
      <line x1="208" y1="392" x2="206" y2="456"/>
      <line x1="283" y1="400" x2="287" y2="690"/>
      <line x1="392" y1="400" x2="392" y2="668"/>
      <line x1="412" y1="400" x2="412" y2="680"/>
