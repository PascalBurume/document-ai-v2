      <line x1="470" y1="400" x2="470" y2="660"/>
      <line x1="487" y1="132" x2="486" y2="632"/>
    </g>

    <!-- hachures du triangle rabattu -->
    <g stroke-width="0.9">
      <line x1="308" y1="706" x2="314" y2="700"/>
      <line x1="307" y1="716" x2="318" y2="704"/>
      <line x1="306" y1="726" x2="322" y2="710"/>
      <line x1="304" y1="737" x2="326" y2="714"/>
      <line x1="302" y1="748" x2="330" y2="720"/>
      <line x1="301" y1="758" x2="334" y2="725"/>
      <line x1="300" y1="768" x2="338" y2="730"/>
