      <line x1="290" y1="832" x2="362" y2="760"/>
      <line x1="288" y1="842" x2="366" y2="766"/>
      <line x1="287" y1="853" x2="370" y2="770"/>
      <line x1="286" y1="864" x2="374" y2="776"/>
      <line x1="284" y1="874" x2="377" y2="781"/>
