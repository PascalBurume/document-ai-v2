<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 520" width="720" height="520">
  <rect width="720" height="520" fill="#fff"/>
  <g stroke="#111" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- plate frame (slightly skewed, as on the scan) -->
    <path d="M8 10 L712 8 L706 508 L22 510 Z" stroke-width="1.2"/>

    <!-- reference / trace lines (near-vertical family: the ligne de terre is vertical here,
         the plate is drawn with the page turned) -->
    <line x1="172" y1="10" x2="192" y2="509" stroke-width="1.1"/>   <!-- pi^H ch^H -->
    <line x1="211" y1="10" x2="231" y2="509" stroke-width="1.1"/>   <!-- f^H -->
    <line x1="298" y1="10" x2="158" y2="510" stroke-width="1"/>     <!-- h^H -->
    <line x1="648" y1="9" x2="648" y2="508" stroke-width="1.1"/>    <!-- h^V -->
    <line x1="492" y1="9" x2="708" y2="508" stroke-width="1"/>      <!-- f^V -->
    <line x1="402" y1="8" x2="525" y2="509" stroke-width="1"/>      <!-- d^V_R -->
    <line x1="439" y1="8" x2="563" y2="509" stroke-width="1"/>      <!-- d^V -->
    <line x1="708" y1="9" x2="464" y2="510" stroke-width="1"/>      <!-- ch^V -->

    <!-- p traces -->
    <line x1="27" y1="459" x2="706" y2="161" stroke-width="1"/>     <!-- p^H (lower left) -->
    <line x1="300" y1="140" x2="716" y2="163" stroke-width="1"/>    <!-- p^V_R, shallow, through A^V -->

    <!-- long oblique from the top-left corner through A^H, ending at the p^H label -->
    <line x1="8" y1="46" x2="487" y2="432" stroke-width="1"/>

    <!-- ===== projection horizontale (left) : A B C D ===== -->
    <path d="M180 185 L311 99 L266 316 Z" stroke-width="2.2"/>
    <g stroke-width="1.8" stroke-dasharray="9 5">
      <line x1="180" y1="185" x2="256" y2="246"/>
      <line x1="256" y1="246" x2="266" y2="316"/>
      <line x1="256" y1="246" x2="311" y2="99"/>
    </g>

    <!-- ===== projection verticale (right) : A B C D ===== -->
    <path d="M465 96 L643 183 L643 318 L502 246 Z" stroke-width="2.2"/>
    <line x1="643" y1="183" x2="502" y2="246" stroke-width="2.2"/>
    <line x1="465" y1="96" x2="643" y2="318" stroke-width="1.8" stroke-dasharray="9 5"/>

    <!-- lignes de rappel : horizontal, because the epure is turned 90 deg -->
    <g stroke-width="0.9" stroke-dasharray="5 4">
      <line x1="311" y1="99" x2="465" y2="96"/>
      <line x1="180" y1="185" x2="643" y2="183"/>
      <line x1="205" y1="217" x2="565" y2="215"/>
      <line x1="256" y1="246" x2="502" y2="246"/>
      <line x1="266" y1="316" x2="643" y2="318"/>
      <line x1="221" y1="375" x2="650" y2="372"/>
      <line x1="187" y1="437" x2="650" y2="433"/>
    </g>
  </g>

  <g font-family="Georgia, serif" font-size="15" fill="#111">
    <text x="656" y="52" font-size="19">E 75</text>

    <text x="176" y="44">π<tspan dy="-5" font-size="10">H</tspan><tspan dy="5">ch</tspan><tspan dy="-5" font-size="10">H</tspan></text>
    <text x="236" y="492">f<tspan dy="-5" font-size="10">H</tspan></text>
    <text x="140" y="492">h<tspan dy="-5" font-size="10">H</tspan></text>
    <text x="682" y="470">f<tspan dy="-5" font-size="10">V</tspan></text>
    <text x="654" y="500">h<tspan dy="-5" font-size="10">V</tspan></text>
    <text x="686" y="80">ch<tspan dy="-5" font-size="10">V</tspan></text>
    <text x="398" y="34">d<tspan dy="-5" font-size="10">V</tspan><tspan dy="9" font-size="10">R</tspan></text>
    <text x="448" y="30">d<tspan dy="-5" font-size="10">V</tspan></text>
    <text x="676" y="186">p<tspan dy="-5" font-size="10">V</tspan><tspan dy="9" font-size="10">R</tspan></text>
    <text x="66" y="452">p<tspan dy="-5" font-size="10">H</tspan></text>
    <text x="452" y="410">p<tspan dy="-5" font-size="10">H</tspan></text>

    <text x="156" y="182">A<tspan dy="-5" font-size="10">H</tspan></text>
    <text x="228" y="250">B<tspan dy="-5" font-size="10">H</tspan></text>
    <text x="256" y="334">C<tspan dy="-5" font-size="10">H</tspan></text>
    <text x="316" y="94">D<tspan dy="-5" font-size="10">H</tspan></text>
    <text x="276" y="200">X<tspan dy="-5" font-size="10">H</tspan></text>

    <text x="650" y="196">A<tspan dy="-5" font-size="10">V</tspan></text>
    <text x="506" y="262">B<tspan dy="-5" font-size="10">V</tspan></text>
    <text x="650" y="332">C<tspan dy="-5" font-size="10">V</tspan></text>
    <text x="458" y="88">D<tspan dy="-5" font-size="10">V</tspan></text>
    <text x="488" y="200">X<tspan dy="-5" font-size="10">V</tspan></text>
    <text x="440" y="196">X<tspan dy="-5" font-size="10">V</tspan><tspan dy="9" font-size="10">R</tspan></text>
    <text x="452" y="232">B<tspan dy="-5" font-size="10">V</tspan><tspan dy="9" font-size="10">R</tspan></text>
  </g>
</svg>
