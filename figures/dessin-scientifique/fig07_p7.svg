<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 930" width="720" height="930">
  <rect width="720" height="930" fill="#fff"/>
  <g stroke="#111" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- cadre -->
    <rect x="20" y="12" width="682" height="905" stroke-width="1.2"/>

    <!-- lignes de reference -->
    <line x1="22" y1="687" x2="700" y2="681" stroke-width="1.3"/>    <!-- pi^H ch^H -->
    <line x1="22" y1="330" x2="700" y2="215" stroke-width="1"/>       <!-- ch^V -->
    <!-- fleche sous ch^V -->
    <line x1="126" y1="308" x2="126" y2="330" stroke-width="1.1"/>
    <line x1="126" y1="330" x2="122" y2="321" stroke-width="1.1"/>
    <line x1="126" y1="330" x2="130" y2="321" stroke-width="1.1"/>

    <!-- alpha^V : porte A^V et B^V -->
    <line x1="22" y1="648" x2="702" y2="152" stroke-width="1"/>
    <!-- alpha^V_R : porte B^V_R, X^V_R, A^V_R -->
    <line x1="205" y1="30" x2="702" y2="221" stroke-width="1"/>
    <!-- alpha^H : porte B^H et A^H -->
    <line x1="22" y1="292" x2="702" y2="729" stroke-width="1"/>

    <!-- projection verticale : triangle O A^V B^V -->
    <path d="M253 290 L500 296 L308 435 Z" stroke-width="2.6"/>
    <!-- projection horizontale : triangle O^H B^H A^H -->
    <path d="M245 687 L308 475 L495 595 Z" stroke-width="2.6"/>

    <!-- rayons fins issus de O -->
    <line x1="253" y1="290" x2="205" y2="32" stroke-width="0.9"/>
    <line x1="253" y1="290" x2="415" y2="95" stroke-width="0.9"/>
    <line x1="253" y1="290" x2="480" y2="122" stroke-width="0.9"/>

    <!-- rabattements : R vers la projection -->
    <path d="M205 34 L308 432" stroke-width="1" stroke-dasharray="16 9"/>
    <path d="M415 96 L460 330" stroke-width="1" stroke-dasharray="16 9"/>
    <path d="M480 122 L500 292" stroke-width="1" stroke-dasharray="16 9"/>

    <!-- lignes de rappel -->
    <g stroke-width="1.4" stroke-dasharray="9 6">
      <line x1="251" y1="296" x2="245" y2="682"/>
      <line x1="308" y1="441" x2="308" y2="470"/>
      <line x1="460" y1="338" x2="461" y2="553"/>
      <line x1="499" y1="302" x2="496" y2="589"/>
      <line x1="637" y1="200" x2="633" y2="682"/>
    </g>
  </g>

  <g font-family="Georgia, serif" font-size="15" fill="#111">
    <text x="48" y="52" font-size="19">E 65</text>

    <text x="196" y="36">B<tspan dy="-5" font-size="10">V</tspan><tspan dy="9" font-size="10">R</tspan></text>
    <text x="406" y="94">X<tspan dy="-5" font-size="10">V</tspan><tspan dy="9" font-size="10">R</tspan></text>
    <text x="472" y="122">A<tspan dy="-5" font-size="10">V</tspan><tspan dy="9" font-size="10">R</tspan></text>
    <text x="676" y="152">α<tspan dy="-5" font-size="10">V</tspan></text>
    <text x="674" y="204">α<tspan dy="-5" font-size="10">V</tspan><tspan dy="9" font-size="10">R</tspan></text>

    <text x="92" y="306">Ch<tspan dy="-5" font-size="10">V</tspan></text>
    <text x="232" y="284">O<tspan dy="-5" font-size="10">H</tspan></text>
    <text x="504" y="302">A<tspan dy="-5" font-size="10">V</tspan></text>
    <text x="456" y="342">X<tspan dy="-5" font-size="10">V</tspan></text>
    <text x="312" y="442">B<tspan dy="-5" font-size="10">V</tspan></text>
    <text x="312" y="474">B<tspan dy="-5" font-size="10">H</tspan></text>
    <text x="456" y="566">X<tspan dy="-5" font-size="10">H</tspan></text>
    <text x="498" y="592">A<tspan dy="-5" font-size="10">H</tspan></text>

    <text x="44" y="682">π<tspan dy="-5" font-size="10">H</tspan><tspan dy="5">ch</tspan><tspan dy="-5" font-size="10">H</tspan></text>
    <text x="238" y="704">O<tspan dy="-5" font-size="10">H</tspan></text>
    <text x="664" y="704">α<tspan dy="-5" font-size="10">H</tspan></text>
  </g>
</svg>
