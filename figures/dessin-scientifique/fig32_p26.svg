    <!-- cadre de la planche -->
    <path d="M13 23 L706 6 L712 500 L34 502 Z" stroke-width="1"/>

    <!-- f^H : verticale de gauche -->
    <path d="M238 15 L223 502" stroke-width="1"/>
    <!-- LT (V/H) : verticale de droite -->
    <path d="M467 15 L472 180 L478 502" stroke-width="1"/>

    <!-- L'T'.V' / H' ... (ABC)V' : oblique descendant vers la gauche -->
    <path d="M329 17 L112 500" stroke-width="1"/>
    <!-- f^V : oblique descendant vers la droite -->
    <path d="M356 19 L406 158 L455 300 L500 502" stroke-width="1"/>

    <!-- p^H : longue oblique passant par A^V -->
    <path d="M15 361 L472 180 L700 88" stroke-width="1"/>
    <!-- oblique portant les reperes x^V et p^V -->
    <path d="M20 395 L703 164" stroke-width="1"/>

    <!-- droite passant par D' et A^V'C^V' -->
    <path d="M141 199 L213 276 L250 314" stroke-width="1"/>
    <!-- droite issue de B^V' -->
    <path d="M263 145 L302 308" stroke-width="1"/>

    <!-- ===== projection horizontale (trait fort) ===== -->
    <path d="M177 186 L177 293 L247 357 L313 238 Z" stroke-width="2.4"/>
    <path d="M177 186 L213 276 L247 357" stroke-width="2.4"/>
    <path d="M213 276 L313 238" stroke-width="2.4"/>

    <!-- ===== projection verticale (trait fort) ===== -->
    <path d="M472 182 L373 236 L342 289 L313 238 Z" stroke-width="2.4"/>
    <path d="M472 182 L472 353 L342 289" stroke-width="2.4"/>

    <!-- ligne x (grand tirete) -->
    <path d="M315 243 L472 351" stroke-width="1.8" stroke-dasharray="14 7"/>
    <!-- construction B^H' (tirete) -->
    <path d="M293 148 L313 235" stroke-width="1.4" stroke-dasharray="9 5"/>

    <!-- lignes de rappel horizontales (LT verticale) -->
