    <text x="350" y="628">O<tspan dy="-5" font-size="10">H</tspan></text>
    <text x="362" y="690">K<tspan dy="-5" font-size="10">H</tspan></text>
    <text x="402" y="696">K<tspan dy="4" font-size="10">1</tspan></text>
