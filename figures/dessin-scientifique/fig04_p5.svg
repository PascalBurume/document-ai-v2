    <text x="292" y="440">X<tspan dy="-5" font-size="10">V</tspan></text>
    <text x="368" y="464">K<tspan dy="-5" font-size="10">V</tspan></text>

    <text x="298" y="552">B<tspan dy="-5" font-size="10">H</tspan></text>
    <text x="222" y="726">A<tspan dy="-5" font-size="10">H</tspan></text>
    <text x="480" y="642">C<tspan dy="-5" font-size="10">H</tspan></text>
