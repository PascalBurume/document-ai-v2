    <line x1="577" y1="14" x2="571" y2="419" stroke-width="1"/>    <!-- n^V -->
    <line x1="545" y1="14" x2="539" y2="419" stroke-width="1"/>    <!-- m^V -->
    <line x1="455" y1="15" x2="454" y2="419" stroke-width="1.1"/>  <!-- pi^V ch^V -->
    <line x1="429" y1="14" x2="591" y2="419" stroke-width="1"/>    <!-- f^V -->
    <line x1="327" y1="14" x2="169" y2="419" stroke-width="1"/>    <!-- ch^H -->
    <line x1="288" y1="16" x2="299" y2="419" stroke-width="1"/>    <!-- f^H -->
    <line x1="238" y1="14" x2="247" y2="419" stroke-width="1"/>    <!-- n^H -->
