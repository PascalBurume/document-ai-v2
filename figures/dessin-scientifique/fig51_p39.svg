    <path d="M123 218 L312 324" stroke-width="2.2"/>
    <path d="M312 324 L368 357" stroke-width="2.2"/>
    <path d="M290 115 L141 355" stroke-width="1.8" stroke-dasharray="9 5"/>
    <path d="M203 168 L141 355" stroke-width="1.8" stroke-dasharray="9 5"/>

