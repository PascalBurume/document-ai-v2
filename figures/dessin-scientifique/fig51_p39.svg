      <line x1="203" y1="168" x2="549" y2="166"/>   <!-- L -->
      <line x1="123" y1="218" x2="644" y2="214"/>   <!-- S -->
      <line x1="147" y1="240" x2="628" y2="235"/>   <!-- K -->
      <line x1="256" y1="280" x2="498" y2="273"/>   <!-- H -->
    </g>

    <!-- ===== projection verticale ===== -->
    <path d="M460 113 L549 166 L644 214 L639 319 L635 351 L418 351 Z" stroke-width="2.2"/>
    <path d="M644 214 L475 316" stroke-width="2.2"/>
