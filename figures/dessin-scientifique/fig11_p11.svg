    <text x="256" y="424">D<tspan dy="-5" font-size="10">V</tspan><tspan dy="9" font-size="10">R</tspan></text>
    <text x="640" y="84">γ<tspan dy="-5" font-size="10">V</tspan></text>
    <text x="648" y="218">P<tspan dy="-5" font-size="10">V</tspan></text>
    <text x="656" y="316">X<tspan dy="-5" font-size="10">H</tspan><tspan dy="9" font-size="10">R</tspan></text>

    <!-- projection horizontale -->
