    <text x="362" y="52">B<tspan dy="-5" font-size="10">V</tspan><tspan dy="9" font-size="10">R</tspan></text>
    <text x="322" y="88">Y<tspan dy="-5" font-size="10">V</tspan><tspan dy="9" font-size="10">R</tspan></text>
    <text x="352" y="90">Y'</text>
