<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 550" width="720" height="550">
  <rect width="720" height="550" fill="#fff"/>
  <g stroke="#111" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- plate frame -->
    <path d="M14 14 L706 12 L708 538 L16 540 Z" stroke-width="1.2"/>

    <!-- lignes de construction -->
    <g stroke-width="1">
      <line x1="75" y1="15" x2="170" y2="540"/>
      <line x1="152" y1="15" x2="140" y2="540"/>   <!-- pi ch^H -->
      <line x1="398" y1="15" x2="545" y2="540"/>   <!-- Ch^V -->
      <line x1="27" y1="249" x2="335" y2="58"/>
      <line x1="200" y1="15" x2="400" y2="212"/>
      <line x1="14" y1="163" x2="400" y2="212"/>
    </g>

    <!-- ===== projection horizontale : M L K N ===== -->
    <path d="M99 72 L267 195 L196 376 L27 249 Z" stroke-width="2.2"/>
