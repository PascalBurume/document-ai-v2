    <text x="134" y="40">π<tspan dy="5"> ch</tspan><tspan dy="-5" font-size="10">H</tspan></text>
    <text x="214" y="96">A<tspan dy="-5" font-size="10">V</tspan><tspan dy="9" font-size="10">R</tspan></text>
