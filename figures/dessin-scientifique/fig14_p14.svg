      <line x1="272" y1="196" x2="368" y2="197"/>
      <line x1="152" y1="223" x2="458" y2="228"/>
      <line x1="33" y1="250" x2="554" y2="257"/>
      <line x1="202" y1="376" x2="470" y2="376"/>
      <line x1="150" y1="473" x2="530" y2="478"/>
    </g>
