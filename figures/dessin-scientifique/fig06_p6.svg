<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 550 720" width="550" height="720"><rect width="550" height="720" fill="#fff"/><g transform="translate(0 720) rotate(-90)">
  <rect width="720" height="550" fill="#fff"/>
  <g stroke="#111" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- cadre : la planche est imprimee de cote -->
    <rect x="14" y="12" width="692" height="528" stroke-width="1.2"/>

    <!-- droites traversant la planche -->
    <line x1="480" y1="14" x2="508" y2="540" stroke-width="1.1"/>   <!-- pi^V ch^V -->
    <line x1="132" y1="14" x2="290" y2="540" stroke-width="1"/>     <!-- ch^V, passe par O^H -->
    <line x1="480" y1="14" x2="155" y2="540" stroke-width="1"/>     <!-- alpha^H -->
    <line x1="540" y1="14" x2="132" y2="540" stroke-width="1"/>     <!-- alpha^H_R -->
    <line x1="210" y1="14" x2="607" y2="540" stroke-width="1"/>     <!-- alpha^V -->
    <line x1="15" y1="301" x2="490" y2="186" stroke-width="1"/>

    <!-- fleche sur ch^V -->
    <line x1="277" y1="483" x2="250" y2="492" stroke-width="1.1"/>
    <line x1="250" y1="492" x2="259" y2="491" stroke-width="1.1"/>
    <line x1="250" y1="492" x2="257" y2="497" stroke-width="1.1"/>

    <!-- projection horizontale : triangle O^H A^H B^H -->
    <path d="M187 190 L328 260 L262 362 Z" stroke-width="2.4"/>
    <!-- projection verticale : triangle O^V A^V B^V -->
    <path d="M487 187 L393 258 L467 361 Z" stroke-width="2.4"/>

    <!-- rayons de rabattement issus de O^H (trait mixte) -->
    <path d="M187 190 L430 276" stroke-width="0.9" stroke-dasharray="16 4 2 4"/>
    <path d="M187 190 L292 393" stroke-width="0.9" stroke-dasharray="16 4 2 4"/>

    <!-- constructions fines -->
    <line x1="328" y1="260" x2="360" y2="250" stroke-width="0.9"/>
    <line x1="262" y1="362" x2="276" y2="362" stroke-width="0.9"/>
    <line x1="187" y1="190" x2="360" y2="250" stroke-width="0.9"/>
    <line x1="187" y1="190" x2="276" y2="362" stroke-width="0.9"/>

    <!-- lignes de rappel (horizontales, la LT est verticale) -->
    <g stroke-width="1.1" stroke-dasharray="9 5">
      <line x1="189" y1="190" x2="488" y2="187"/>
      <line x1="330" y1="259" x2="391" y2="258"/>
      <line x1="264" y1="362" x2="465" y2="361"/>
      <line x1="242" y1="400" x2="505" y2="398"/>
    </g>
  </g>

  <g font-family="Georgia, serif" font-size="15" fill="#111">
    <text x="660" y="28" font-size="19" transform="rotate(90 660 28)">E 64</text>

    <text x="546" y="34" transform="rotate(90 546 34)">α<tspan dy="-5" font-size="10">H</tspan><tspan dy="9" font-size="10">R</tspan></text>
    <text x="170" y="520" transform="rotate(90 170 520)">α<tspan dy="-5" font-size="10">H</tspan></text>
    <text x="598" y="518" transform="rotate(90 598 518)">α<tspan dy="-5" font-size="10">V</tspan></text>
    <text x="282" y="508" transform="rotate(90 282 508)">ch<tspan dy="-5" font-size="10">V</tspan></text>
    <text x="504" y="480" transform="rotate(90 504 480)">π<tspan dy="-5" font-size="10">V</tspan><tspan dy="5">ch</tspan><tspan dy="-5" font-size="10">V</tspan></text>

    <text x="176" y="166" transform="rotate(90 176 166)">O<tspan dy="-5" font-size="10">H</tspan></text>
    <text x="494" y="182" transform="rotate(90 494 182)">O<tspan dy="-5" font-size="10">V</tspan></text>

    <text x="360" y="212" transform="rotate(90 360 212)">X<tspan dy="-5" font-size="10">H</tspan></text>
    <text x="396" y="200" transform="rotate(90 396 200)">X<tspan dy="-5" font-size="10">H</tspan><tspan dy="9" font-size="10">R</tspan></text>

    <text x="322" y="266" transform="rotate(90 322 266)">A<tspan dy="-5" font-size="10">H</tspan></text>
    <text x="354" y="266" transform="rotate(90 354 266)">A<tspan dy="-5" font-size="10">H</tspan><tspan dy="9" font-size="10">R</tspan></text>
    <text x="392" y="264" transform="rotate(90 392 264)">A<tspan dy="-5" font-size="10">V</tspan></text>

    <text x="242" y="366" transform="rotate(90 242 366)">B<tspan dy="-5" font-size="10">H</tspan></text>
    <text x="268" y="368" transform="rotate(90 268 368)">B<tspan dy="-5" font-size="10">H</tspan><tspan dy="9" font-size="10">R</tspan></text>
    <text x="462" y="366" transform="rotate(90 462 366)">B<tspan dy="-5" font-size="10">V</tspan></text>
  </g>
</g></svg>