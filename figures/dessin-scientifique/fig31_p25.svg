    <g stroke-width="1.2" stroke-dasharray="9 6">
      <line x1="112" y1="177" x2="112" y2="228"/>
      <line x1="230" y1="175" x2="230" y2="317"/>
    </g>
  </g>

  <g font-family="Georgia, serif" font-size="15" fill="#111">
    <text x="46" y="154" transform="rotate(180 46 154)">V'</text>
    <text x="85" y="180" transform="rotate(180 85 180)">LT H</text>

    <text x="114" y="143" transform="rotate(90 114 143)">C<tspan dy="-5" font-size="10">H</tspan></text>
    <text x="232" y="142" transform="rotate(90 232 142)">B<tspan dy="-5" font-size="10">H</tspan></text>
    <text x="324" y="138" transform="rotate(90 324 138)">A<tspan dy="-5" font-size="10">H</tspan></text>
    <text x="324" y="178" transform="rotate(90 324 178)">A<tspan dy="-5" font-size="10">V'</tspan></text>
    <text x="92" y="232" transform="rotate(90 92 232)">C<tspan dy="-5" font-size="10">V'</tspan></text>
    <text x="236" y="327" transform="rotate(90 236 327)">B<tspan dy="-5" font-size="10">V'</tspan></text>

    <text x="464" y="142" transform="rotate(90 464 142)">B<tspan dy="-5" font-size="10">V</tspan></text>
    <text x="553" y="142" transform="rotate(90 553 142)">C<tspan dy="-5" font-size="10">V</tspan></text>
    <text x="622" y="142" transform="rotate(90 622 142)">A<tspan dy="-5" font-size="10">V</tspan></text>

    <text x="617" y="378" transform="rotate(90 617 378)">LT. V</text>
    <text x="594" y="402" transform="rotate(90 594 402)">H</text>

    <text x="22" y="305" transform="rotate(90 22 305)" font-size="17">( P )</text>
