<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 720" width="480" height="720"><rect width="480" height="720" fill="#fff"/><g transform="translate(0 720) rotate(-90)">
  <rect width="720" height="480" fill="#fff"/>
  <g stroke="#111" fill="none" stroke-linecap="round" stroke-linejoin="round">

    <!-- ligne de terre -->
    <path d="M20 174 L315 172 L718 166" stroke-width="1.6"/>
    <!-- droite verticale (LT du systeme auxiliaire) -->
    <path d="M615 20 L612 470" stroke-width="1.6"/>

