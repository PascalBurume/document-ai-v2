    <text x="513" y="262" transform="rotate(90 513 262)">O<tspan dy="-5" font-size="10">V</tspan></text>
    <text x="424" y="266" transform="rotate(90 424 266)">H</text>
    <text x="409" y="272" transform="rotate(90 409 272)">O R</text>
    <text x="506" y="274" transform="rotate(90 506 274)">D<tspan dy="-5" font-size="10">H</tspan></text>

    <text x="113" y="257" transform="rotate(90 113 257)">P<tspan dy="-5" font-size="10">H</tspan></text>
    <text x="71" y="260" transform="rotate(90 71 260)">P<tspan dy="-5" font-size="10">HV</tspan></text>
    <text x="601" y="262" transform="rotate(90 601 262)">P<tspan dy="-5" font-size="10">V</tspan></text>
    <text x="599" y="190" transform="rotate(90 599 190)">P<tspan dy="-5" font-size="10">H'</tspan></text>
