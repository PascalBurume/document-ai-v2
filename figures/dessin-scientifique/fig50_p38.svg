<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 720" width="420" height="720"><rect width="420" height="720" fill="#fff"/><g transform="translate(0 720) rotate(-90)">
  <rect width="720" height="420" fill="#fff"/>
  <!-- NOTE: the plate is printed sideways in the scan; all lettering reads rotated 90 deg CW,
       reproduced here with rotate(90) transforms so the drawing matches the source crop. -->
  <g stroke="#111" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- plate frame -->
    <path d="M11 7 L700 6 L707 414 L17 416 Z" stroke-width="1.2"/>

    <!-- reference lines (horizontal in the plate = vertical in this crop) -->
    <line x1="208" y1="7" x2="208" y2="416" stroke-width="1.1"/>   <!-- V / H : ligne de terre -->
    <line x1="295" y1="7" x2="295" y2="416" stroke-width="1.1"/>   <!-- ch^H -->
    <line x1="421" y1="7" x2="421" y2="416" stroke-width="1.1"/>   <!-- pi^V ch^V -->

    <!-- ligne de rappel of D, drawn solid across the plate (P^H, P^HV, D^H, D^V) -->
    <line x1="12" y1="248" x2="706" y2="256" stroke-width="1"/>

    <!-- other lignes de rappel -->
    <g stroke-width="0.9" stroke-dasharray="5 4">
      <line x1="236" y1="107" x2="483" y2="105"/>   <!-- B -->
      <line x1="101" y1="295" x2="620" y2="301"/>   <!-- C -->
      <line x1="290" y1="352" x2="421" y2="353"/>   <!-- A -->
    </g>

    <!-- line a^H : through B^H and C^H, prolonged -->
    <line x1="18" y1="407" x2="308" y2="8" stroke-width="1"/>
    <!-- line a^V : through B^V and C^V, prolonged -->
    <line x1="415" y1="8" x2="700" y2="415" stroke-width="1"/>

    <!-- rabattement traces (long dash) -->
    <line x1="325" y1="30" x2="700" y2="420" stroke-width="1" stroke-dasharray="14 6"/>
    <line x1="700" y1="69" x2="391" y2="412" stroke-width="1" stroke-dasharray="14 6"/>

    <!-- thin obliques from A^V towards the lower-right corner (P^H', D^H') -->
    <line x1="421" y1="353" x2="675" y2="419" stroke-width="1"/>
    <line x1="421" y1="353" x2="651" y2="419" stroke-width="1"/>

    <!-- ===== projection horizontale : A^H B^H C^H D^H ===== -->
    <path d="M236 107 L101 295 L291 352 L362 253 Z" stroke-width="2.2"/>
    <path d="M236 107 L362 253" stroke-width="2.2"/>
    <path d="M101 295 L362 253" stroke-width="2.2"/>
    <path d="M236 107 L291 352" stroke-width="1.8" stroke-dasharray="9 5"/>

    <!-- ===== projection verticale : A^V B^V C^V D^V ===== -->
    <path d="M483 105 L620 301 L421 353 Z" stroke-width="2.2"/>
    <path d="M483 105 L667 255 L620 301" stroke-width="2.2"/>
    <path d="M483 105 L421 353" stroke-width="2.2"/>
    <path d="M667 255 L421 353" stroke-width="1.8" stroke-dasharray="9 5"/>

    <!-- arrow beside ch^H -->
    <line x1="296" y1="60" x2="316" y2="60" stroke-width="1"/>
    <path d="M309 55 L317 60 L309 65" stroke-width="1"/>
  </g>

