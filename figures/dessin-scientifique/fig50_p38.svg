    <text x="513" y="141" transform="rotate(90 513 141)">X<tspan dy="-5" font-size="10">V</tspan></text>
    <text x="411" y="157" transform="rotate(90 411 157)">X<tspan dy="-5" font-size="10">H</tspan><tspan dy="9" font-size="10">R</tspan></text>
    <text x="380" y="92" transform="rotate(90 380 92)">B<tspan dy="-5" font-size="10">H</tspan><tspan dy="9" font-size="10">R</tspan></text>
    <text x="577" y="293" transform="rotate(90 577 293)">C<tspan dy="-5" font-size="10">H</tspan><tspan dy="9" font-size="10">R</tspan></text>

