    <text x="641" y="399" transform="rotate(90 641 399)">D<tspan dy="-5" font-size="10">H'</tspan></text>

    <text x="42" y="390" transform="rotate(90 42 390)">a<tspan dy="-5" font-size="10">H</tspan></text>
    <text x="342" y="39" transform="rotate(90 342 39)">a<tspan dy="-5" font-size="10">H</tspan><tspan dy="9" font-size="10">R</tspan></text>
    <text x="680" y="386" transform="rotate(90 680 386)">a<tspan dy="-5" font-size="10">V</tspan></text>
  </g>
