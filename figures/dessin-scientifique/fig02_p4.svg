    <line x1="65" y1="171" x2="69" y2="180" stroke-width="1.1"/>

    <!-- projection verticale : triangle A^V B^V C^V (fin) -->
    <path d="M115 185 L213 109 L310 227 Z" stroke-width="1.1"/>
    <!-- rabattement : triangle A^V_R B^V_R C^V_R (fort) -->
    <path d="M115 185 L233 237 L271 44 Z" stroke-width="2.6"/>

