<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 530" width="720" height="530">
  <rect width="720" height="530" fill="#fff"/>
  <g stroke="#111" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- plate frame (slightly skewed on the scan) -->
    <path d="M34 14 L700 18 L706 504 L36 508 Z" stroke-width="1.2"/>

    <!-- long construction lines of the plate -->
    <!-- a^H : passes C^H and X^H -->
    <line x1="16" y1="87" x2="400" y2="373" stroke-width="1"/>
    <!-- a^H_R : from bottom-left through A^H and B^H_R -->
    <line x1="31" y1="503" x2="305" y2="210" stroke-width="1"/>
    <!-- e^H : steep line, bottom-left to top -->
    <line x1="142" y1="506" x2="250" y2="16" stroke-width="1"/>
    <!-- Ch^H : charniere, through D^H and A^H (both fixed by the rabattement) -->
    <line x1="135" y1="16" x2="279" y2="505" stroke-width="1"/>
    <!-- Ch^V : through D^V and A^V -->
    <line x1="465" y1="16" x2="486" y2="505" stroke-width="1"/>
    <!-- gamma^V : through X^V and C^V -->
    <line x1="395" y1="305" x2="645" y2="19" stroke-width="1"/>
    <!-- e^V -->
    <line x1="340" y1="208" x2="598" y2="508" stroke-width="1"/>

    <!-- ===== projection horizontale : hexagone A B C D E F ===== -->
    <path d="M144 47 L245 86 L285 206 L217 295 L105 258 L79 131 Z" stroke-width="2.2"/>
    <!-- diagonales -->
    <g stroke-width="1">
      <line x1="79" y1="131" x2="285" y2="206"/>
      <line x1="105" y1="258" x2="245" y2="86"/>
      <line x1="105" y1="258" x2="285" y2="206"/>
    </g>

    <!-- ===== rabattement : hexagone vrai grandeur ===== -->
    <path d="M144 47 L263 77 L303 212 L217 295 L110 272 L56 144 Z"
          stroke-width="1.1" stroke-dasharray="14 6"/>

    <!-- ===== projection verticale : hexagone ===== -->
    <path d="M467 52 L538 138 L540 262 L477 300 L401 206 L401 95 Z" stroke-width="2.2"/>

    <!-- ===== lignes de rappel (horizontales sur cette planche) ===== -->
    <g stroke-width="0.9" stroke-dasharray="9 5">
      <line x1="150" y1="47" x2="467" y2="52"/>
      <line x1="251" y1="87" x2="401" y2="95"/>
      <line x1="85" y1="132" x2="538" y2="138"/>
      <line x1="185" y1="171" x2="471" y2="176"/>
      <line x1="290" y1="206" x2="401" y2="206"/>
      <line x1="111" y1="258" x2="540" y2="262"/>
      <line x1="223" y1="295" x2="477" y2="300"/>
      <line x1="296" y1="286" x2="401" y2="298"/>
      <line x1="245" y1="367" x2="530" y2="378"/>
    </g>
  </g>

  <g font-family="Georgia, serif" font-size="15" fill="#111">
    <text x="632" y="46" font-size="17">E 67</text>

    <!-- projection horizontale -->
    <text x="108" y="32">D<tspan dy="-5" font-size="10">H</tspan><tspan dy="5"> D</tspan><tspan dy="-5" font-size="10">H</tspan><tspan dy="9" font-size="10">R</tspan></text>
    <text x="262" y="70">C<tspan dy="-5" font-size="10">H</tspan><tspan dy="9" font-size="10">R</tspan></text>
