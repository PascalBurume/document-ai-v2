    <text x="182" y="312">A<tspan dy="-5" font-size="10">H</tspan><tspan dy="9" font-size="10">R</tspan></text>
    <text x="222" y="318">A<tspan dy="-5" font-size="10">H</tspan></text>
    <text x="296" y="304">X<tspan dy="-5" font-size="10">H</tspan></text>
    <text x="124" y="352">X<tspan dy="-5" font-size="10">H</tspan><tspan dy="9" font-size="10">R</tspan></text>
    <text x="26" y="98">a<tspan dy="-5" font-size="10">H</tspan></text>
    <text x="44" y="482">a<tspan dy="-5" font-size="10">H</tspan><tspan dy="9" font-size="10">R</tspan></text>
    <text x="146" y="508">e<tspan dy="-5" font-size="10">H</tspan></text>
    <text x="262" y="496">Ch<tspan dy="-5" font-size="10">H</tspan></text>

    <!-- projection verticale -->
    <text x="472" y="44">D<tspan dy="-5" font-size="10">V</tspan></text>
    <text x="606" y="60">γ<tspan dy="-5" font-size="10">V</tspan></text>
    <text x="380" y="92">E<tspan dy="-5" font-size="10">V</tspan></text>
    <text x="544" y="150">C<tspan dy="-5" font-size="10">V</tspan></text>
    <text x="466" y="168">O<tspan dy="-5" font-size="10">V</tspan></text>
    <text x="378" y="206">F<tspan dy="-5" font-size="10">V</tspan></text>
