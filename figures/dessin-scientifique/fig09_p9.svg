    <text x="482" y="316">A<tspan dy="-5" font-size="10">V</tspan></text>
    <text x="406" y="292">X<tspan dy="-5" font-size="10">V</tspan></text>
    <text x="476" y="470">π<tspan dy="-5" font-size="10">V</tspan><tspan dy="5">Ch</tspan><tspan dy="-5" font-size="10">V</tspan></text>
    <text x="584" y="508">e<tspan dy="-5" font-size="10">V</tspan></text>
  </g>
