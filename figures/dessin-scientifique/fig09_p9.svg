    <text x="274" y="196">F<tspan dy="-5" font-size="10">H</tspan></text>
    <text x="298" y="219">B<tspan dy="-5" font-size="10">H</tspan><tspan dy="9" font-size="10">R</tspan></text>
    <text x="180" y="238">Y<tspan dy="-5" font-size="10">H</tspan><tspan dy="9" font-size="10">R</tspan></text>
    <text x="188" y="260">Y<tspan dy="-5" font-size="10">H</tspan></text>
    <text x="86" y="256">B<tspan dy="-5" font-size="10">H</tspan></text>
