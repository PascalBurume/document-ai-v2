    <text x="344" y="209" transform="rotate(90 344 209)">N<tspan dy="-5" font-size="10">V</tspan></text>
    <text x="409" y="208" transform="rotate(90 409 208)">B<tspan dy="-5" font-size="10">V</tspan></text>

    <text x="504" y="213" transform="rotate(90 504 213)">M<tspan dy="-5" font-size="10">V</tspan></text>
    <text x="504" y="245" transform="rotate(90 504 245)">M<tspan dy="-5" font-size="10">H'</tspan></text>

    <text x="564" y="210" transform="rotate(90 564 210)">A<tspan dy="-5" font-size="10">V</tspan></text>
    <text x="561" y="268" transform="rotate(90 561 268)">A<tspan dy="-5" font-size="10">H'</tspan></text>

