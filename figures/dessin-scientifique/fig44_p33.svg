<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 510 720" width="510" height="720"><rect width="510" height="720" fill="#fff"/><g transform="translate(0 720) rotate(-90)">
  <rect width="720" height="510" fill="#fff"/>
