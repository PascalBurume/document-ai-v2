    <text x="271" y="44" transform="rotate(90 271 44)">H</text>
    <text x="305" y="42" transform="rotate(90 305 42)">V</text>

    <text x="96" y="196" transform="rotate(90 96 196)">B<tspan dy="-5" font-size="10">H</tspan></text>
    <text x="154" y="203" transform="rotate(90 154 203)">N<tspan dy="-5" font-size="10">H</tspan></text>
    <text x="217" y="209" transform="rotate(90 217 209)">A<tspan dy="-5" font-size="10">H</tspan></text>
