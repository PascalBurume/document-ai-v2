    <text x="222" y="212">X<tspan dy="4" font-size="10">1</tspan></text>
    <text x="546" y="416">V<tspan dy="4" font-size="10">1</tspan></text>
    <text x="546" y="432">H<tspan dy="4" font-size="10">1</tspan></text>

    <!-- traces a gauche -->
    <text x="20" y="404">b<tspan dy="-5" font-size="10">V</tspan></text>
    <text x="36" y="404">α<tspan dy="-5" font-size="10">V</tspan></text>
    <text x="54" y="404">λ<tspan dy="-5" font-size="10">V</tspan></text>
    <text x="36" y="556">π<tspan dy="-5" font-size="10">H</tspan></text>
    <text x="44" y="618">p<tspan dy="-5" font-size="10">H</tspan></text>
    <text x="30" y="688">b<tspan dy="-5" font-size="10">H</tspan></text>

    <!-- projection horizontale -->
    <text x="94" y="714">A<tspan dy="-5" font-size="10">H</tspan></text>
    <text x="232" y="650">K<tspan dy="-5" font-size="10">H</tspan></text>
    <text x="382" y="618">S<tspan dy="-5" font-size="10">H</tspan></text>
