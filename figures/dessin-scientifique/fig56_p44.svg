    <text x="394" y="690">J<tspan dy="-5" font-size="10">H</tspan></text>
    <text x="396" y="736">N<tspan dy="-5" font-size="10">H</tspan></text>
    <text x="396" y="774">G<tspan dy="-5" font-size="10">H</tspan></text>
    <text x="510" y="800">M<tspan dy="-5" font-size="10">H</tspan></text>
    <text x="218" y="812">x<tspan dy="-5" font-size="10">H</tspan></text>
