    <text x="636" y="890">f<tspan dy="-5" font-size="10">H</tspan></text>
    <text x="628" y="602">f<tspan dy="-5" font-size="10">V</tspan></text>
    <text x="626" y="498">h<tspan dy="-5" font-size="10">H1</tspan></text>

    <!-- rabattements -->
    <text x="72" y="928">K<tspan dy="-5" font-size="10">V'</tspan></text>
    <text x="236" y="828">L<tspan dy="-5" font-size="10">V'</tspan></text>
    <text x="186" y="1110">N<tspan dy="-5" font-size="10">V'</tspan></text>
    <text x="410" y="1038">M<tspan dy="-5" font-size="10">V'</tspan></text>

    <text x="340" y="1096">λ<tspan dy="-5" font-size="10">H</tspan></text>
    <text x="392" y="1076">β<tspan dy="-5" font-size="10">HV</tspan></text>
    <text x="416" y="1094">δ<tspan dy="-5" font-size="10">HV</tspan></text>
    <text x="424" y="1112">p<tspan dy="-5" font-size="10">HV</tspan></text>
    <text x="656" y="1056">H<tspan dy="4" font-size="10">1</tspan></text>
    <text x="650" y="1074">V<tspan dy="4" font-size="10">1</tspan></text>
