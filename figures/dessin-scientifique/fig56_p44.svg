    <text x="208" y="308">x<tspan dy="-5" font-size="10">V</tspan></text>
    <text x="382" y="362">G<tspan dy="-5" font-size="10">V</tspan></text>
    <text x="300" y="338">G<tspan dy="-5" font-size="10">H'</tspan></text>
    <text x="502" y="100">S<tspan dy="-5" font-size="10">H'</tspan></text>
    <text x="614" y="228">h<tspan dy="-5" font-size="10">V</tspan></text>
