<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 920" width="720" height="920">
  <rect width="720" height="920" fill="#fff"/>
  <g stroke="#111" fill="none" stroke-linecap="round" stroke-linejoin="round">

    <!-- ligne de terre pi^V (trace verticale) -->
    <line x1="28" y1="169" x2="697" y2="145" stroke-width="1.4"/>

    <!-- droite verticale : A^V ch^V ... ch^H -->
    <path d="M277 25 L279 890" stroke-width="1.6"/>

    <!-- d_R^H : oblique descendante -->
    <path d="M32 236 L279 535 L398 687 L556 883" stroke-width="1.6"/>

    <!-- p_R^H : oblique montante -->
    <path d="M136 890 L398 687 L500 608 L690 466" stroke-width="1.6"/>

    <!-- rabattement P^H - P_R^H (tirets) -->
    <line x1="279" y1="608" x2="500" y2="608" stroke-width="1.4" stroke-dasharray="14 6"/>

    <!-- Q^H - Q_R^H (trait fort) -->
    <line x1="278" y1="687" x2="398" y2="687" stroke-width="2.6"/>

    <!-- rabattement B^H - B_R^H (tirets) -->
    <line x1="279" y1="730" x2="434" y2="730" stroke-width="1.4" stroke-dasharray="14 6"/>
  </g>

  <g font-family="Georgia, serif" font-size="15" fill="#111">
    <text x="45" y="85" font-size="18">( f )</text>

    <text x="284" y="148">A<tspan dy="-5" font-size="10">V</tspan><tspan dy="5">ch</tspan><tspan dy="-5" font-size="10">V</tspan></text>
    <text x="642" y="143">π<tspan dy="-5" font-size="10">V</tspan></text>

    <text x="238" y="276">Q<tspan dy="-5" font-size="10">V</tspan></text>
    <text x="287" y="315">B<tspan dy="-5" font-size="10">V</tspan></text>
    <text x="246" y="383">P<tspan dy="-5" font-size="10">V</tspan></text>

    <text x="290" y="533">A<tspan dy="-5" font-size="10">H</tspan></text>
    <text x="249" y="611">P<tspan dy="-5" font-size="10">H</tspan></text>
    <text x="528" y="616">P<tspan dy="-5" font-size="10">H</tspan><tspan dy="9" font-size="10">R</tspan></text>
    <text x="616" y="488">P<tspan dy="-5" font-size="10">H</tspan><tspan dy="9" font-size="10">R</tspan></text>

    <text x="249" y="685">Q<tspan dy="-5" font-size="10">H</tspan></text>
    <text x="418" y="702">Q<tspan dy="-5" font-size="10">H</tspan><tspan dy="9" font-size="10">R</tspan></text>

    <text x="290" y="717">B<tspan dy="-5" font-size="10">H</tspan></text>
    <text x="448" y="744">B<tspan dy="-5" font-size="10">H</tspan><tspan dy="9" font-size="10">R</tspan></text>

    <text x="286" y="831">ch<tspan dy="-5" font-size="10">H</tspan></text>
    <text x="531" y="838">d<tspan dy="-5" font-size="10">H</tspan><tspan dy="9" font-size="10">R</tspan></text>
  </g>
</svg>
