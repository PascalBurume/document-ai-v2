<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 550 720" width="550" height="720"><rect width="550" height="720" fill="#fff"/><g transform="translate(0 720) rotate(-90)">
  <rect width="720" height="550" fill="#fff"/>
  <g stroke="#111" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- cadre : planche imprimee de cote -->
    <rect x="14" y="16" width="690" height="522" stroke-width="1.2"/>

    <!-- droites traversant la planche -->
    <line x1="470" y1="16" x2="500" y2="538" stroke-width="1.2"/>   <!-- pi^V ch^V -->
    <line x1="140" y1="16" x2="300" y2="538" stroke-width="1"/>     <!-- ch^H -->
    <line x1="360" y1="16" x2="160" y2="538" stroke-width="1"/>     <!-- a^H -->
    <line x1="560" y1="16" x2="18" y2="428" stroke-width="1"/>      <!-- b^H -->
    <line x1="295" y1="16" x2="600" y2="538" stroke-width="1"/>     <!-- a^V -->
    <line x1="365" y1="16" x2="708" y2="428" stroke-width="1"/>     <!-- b^V -->
    <line x1="14" y1="142" x2="330" y2="180" stroke-width="1"/>     <!-- b^H_R / trace passant par C^H_R -->
    <line x1="14" y1="302" x2="300" y2="292" stroke-width="1"/>     <!-- a^H_R -->

    <!-- fleche sur ch^H -->
    <line x1="262" y1="490" x2="290" y2="488" stroke-width="1.1"/>
    <line x1="290" y1="488" x2="281" y2="484" stroke-width="1.1"/>
    <line x1="290" y1="488" x2="281" y2="492" stroke-width="1.1"/>

    <!-- quadrilatere : projection horizontale -->
    <path d="M80 95 L253 83 L290 280 L118 295 Z" stroke-width="2.6"/>
    <line x1="80" y1="95" x2="290" y2="280" stroke-width="1"/>
    <line x1="253" y1="83" x2="118" y2="295" stroke-width="1"/>

    <!-- quadrilatere : projection verticale -->
    <path d="M405 80 L537 90 L568 290 L433 282 Z" stroke-width="2.6"/>
    <line x1="405" y1="80" x2="568" y2="290" stroke-width="1"/>
    <line x1="537" y1="90" x2="433" y2="282" stroke-width="1"/>

    <!-- rayons de rabattement issus de O^H -->
    <line x1="183" y1="188" x2="216" y2="56" stroke-width="0.9"/>
    <line x1="183" y1="188" x2="50" y2="152" stroke-width="0.9"/>
    <line x1="183" y1="188" x2="332" y2="248" stroke-width="0.9"/>

    <!-- rabattements (traits longs) -->
    <path d="M50 150 L84 96" stroke-width="1.6" stroke-dasharray="14 8"/>
    <path d="M50 152 L118 293" stroke-width="1.6" stroke-dasharray="14 8"/>
    <path d="M216 56 L253 84" stroke-width="1.6" stroke-dasharray="14 8"/>
    <path d="M216 56 L84 94" stroke-width="1.6" stroke-dasharray="14 8"/>
    <path d="M253 84 L136 312" stroke-width="1.6" stroke-dasharray="14 8"/>

    <!-- lignes de rappel : horizontales (la ligne de terre est verticale) -->
    <g stroke-width="1.2" stroke-dasharray="8 5">
      <line x1="255" y1="82" x2="403" y2="79"/>
      <line x1="84" y1="93" x2="535" y2="89"/>
      <line x1="186" y1="187" x2="483" y2="184"/>
      <line x1="292" y1="281" x2="431" y2="282"/>
      <line x1="120" y1="294" x2="566" y2="291"/>
      <line x1="240" y1="390" x2="500" y2="388"/>
    </g>
  </g>

