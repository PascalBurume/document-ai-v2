    <text x="380" y="290">S<tspan dy="-5" font-size="10">V</tspan></text>
    <text x="658" y="58">Ï€<tspan dy="-5" font-size="10">V</tspan></text>

    <text x="178" y="434">A<tspan dy="-5" font-size="10">h</tspan></text>
    <text x="262" y="790">B<tspan dy="-5" font-size="10">h</tspan></text>
    <text x="472" y="656">C<tspan dy="-5" font-size="10">h</tspan></text>
    <text x="366" y="646">S<tspan dy="-5" font-size="10">h</tspan></text>
    <text x="14" y="748">S<tspan dy="-5" font-size="10">h</tspan><tspan dy="9" font-size="10">1</tspan></text>
    <text x="490" y="890">S<tspan dy="-5" font-size="10">h</tspan><tspan dy="9" font-size="10">2</tspan></text>
    <text x="544" y="556">S'</text>

    <text x="92" y="592">â„“<tspan dy="4" font-size="10">1</tspan></text>
