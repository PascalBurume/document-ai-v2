    <text x="336" y="500">M<tspan dy="-5" font-size="10">V</tspan></text>
    <text x="66" y="400">d<tspan dy="-5" font-size="10">H</tspan><tspan dy="9" font-size="10">R</tspan></text>
    <text x="386" y="604">A<tspan dy="-5" font-size="10">H</tspan></text>
    <text x="434" y="600">A<tspan dy="-5" font-size="10">H</tspan><tspan dy="9" font-size="10">R</tspan></text>
    <text x="390" y="736">B<tspan dy="-5" font-size="10">H</tspan></text>
    <text x="558" y="748">B<tspan dy="-5" font-size="10">H</tspan><tspan dy="9" font-size="10">R</tspan></text>
    <text x="332" y="842">M<tspan dy="-5" font-size="10">H</tspan></text>
    <text x="650" y="852">M<tspan dy="-5" font-size="10">H</tspan><tspan dy="9" font-size="10">R</tspan></text>
    <text x="368" y="958">Ch<tspan dy="-5" font-size="10">H</tspan></text>

    <!-- (b) -->
    <text x="360" y="1016">d<tspan dy="-5" font-size="10">HV</tspan></text>
    <text x="366" y="1062">Ch<tspan dy="-5" font-size="10">V</tspan></text>
    <text x="106" y="1146">M<tspan dy="-5" font-size="10">V</tspan><tspan dy="9" font-size="10">R</tspan></text>
    <text x="364" y="1162">M<tspan dy="-5" font-size="10">V</tspan></text>
    <text x="358" y="1330">A<tspan dy="-5" font-size="10">V</tspan></text>
    <text x="400" y="1332">A<tspan dy="-5" font-size="10">V</tspan><tspan dy="9" font-size="10">R</tspan></text>
    <text x="360" y="1448">B<tspan dy="-5" font-size="10">V</tspan></text>
    <text x="490" y="1448">B<tspan dy="-5" font-size="10">V</tspan><tspan dy="9" font-size="10">R</tspan></text>
    <text x="362" y="1602">B<tspan dy="-5" font-size="10">H</tspan></text>
    <text x="352" y="1744">A<tspan dy="-5" font-size="10">H</tspan></text>
    <text x="392" y="1740">Ch<tspan dy="-5" font-size="10">H</tspan></text>
    <text x="500" y="1740">B<tspan dy="-5" font-size="10">H</tspan><tspan dy="9" font-size="10">R</tspan></text>
    <text x="116" y="1744">M<tspan dy="-5" font-size="10">H</tspan><tspan dy="9" font-size="10">R</tspan></text>
