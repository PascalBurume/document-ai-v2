    <path d="M269 529 L430 346" stroke-width="1.8" stroke-dasharray="9 5"/>   <!-- C^V - D^V -->
    <path d="M268 714 L432 529" stroke-width="1.8" stroke-dasharray="9 5"/>   <!-- C^H - D^H -->
    <path d="M432 529 L569 703" stroke-width="1.2" stroke-dasharray="9 5"/>   <!-- vers B^V' -->

    <!-- ===== triangle rabattu K^H' L^H' M^H' ===== -->
    <path d="M209 294 L127 425 L81 458 Z" stroke-width="2.2"/>
