    <path d="M430 346 L302 529" stroke-width="2.2"/>            <!-- D^V - A^V (K^V dessus) -->
    <path d="M302 254 L302 529 L302 742" stroke-width="2.2"/>   <!-- B^V - A^V - A^H -->
    <path d="M302 254 L268 714" stroke-width="2.2"/>            <!-- B^V - C^H -->
    <path d="M302 529 L268 714" stroke-width="2.2"/>            <!-- A^V - C^H -->
