<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 1100" width="720" height="1100">
  <rect width="720" height="1100" fill="#fff"/>
  <g stroke="#111" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- plate frame -->
    <path d="M35 45 L702 36 L700 1082 L28 1088 Z" stroke-width="1.2"/>

    <!-- reference lines -->
    <line x1="31" y1="287" x2="703" y2="270" stroke-width="1"/>    <!-- h^V -->
    <line x1="31" y1="326" x2="703" y2="308" stroke-width="1"/>    <!-- a^V -->
    <line x1="31" y1="432" x2="703" y2="399" stroke-width="1.1"/>  <!-- Ch^V pi^V / Ch^H -->
    <line x1="31" y1="884" x2="703" y2="872" stroke-width="1"/>    <!-- f^H -->

    <!-- long construction lines -->
    <line x1="570" y1="40" x2="574" y2="1082" stroke-width="1"/>   <!-- vertical through Q^V and Q^H -->
    <line x1="30" y1="113" x2="700" y2="608" stroke-width="1"/>    <!-- b^H, through N^V -->
    <line x1="295" y1="36" x2="590" y2="900" stroke-width="1"/>    <!-- b^V / alpha^V -->
    <line x1="30" y1="452" x2="620" y2="45" stroke-width="1"/>     <!-- f^V -->
    <line x1="31" y1="845" x2="703" y2="498" stroke-width="1"/>    <!-- a^H -->

    <!-- lignes de rappel -->
    <g stroke-width="0.9" stroke-dasharray="5 4">
      <line x1="154" y1="206" x2="152" y2="632"/>   <!-- N -->
      <line x1="193" y1="426" x2="193" y2="786"/>   <!-- A -->
      <line x1="254" y1="428" x2="252" y2="760"/>   <!-- K -->
      <line x1="372" y1="197" x2="370" y2="442"/>   <!-- M -->
      <line x1="393" y1="270" x2="393" y2="603"/>
      <line x1="404" y1="270" x2="404" y2="603"/>
      <line x1="419" y1="270" x2="419" y2="603"/>
      <line x1="478" y1="405" x2="478" y2="563"/>   <!-- I / L -->
    </g>

    <!-- ===== projection verticale : N^V M^V I^V A^V (K^V on A^V-I^V) ===== -->
    <path d="M155 206 L373 197 L478 413 L193 426 Z" stroke-width="2.2"/>

    <!-- ===== projection horizontale : N^H M^H I^H K^H ===== -->
    <path d="M152 632 L370 442 L478 563 L252 760 Z" stroke-width="2.2"/>

    <!-- arrow beside Ch^H -->
    <line x1="609" y1="437" x2="609" y2="457" stroke-width="1"/>
    <path d="M604 450 L609 458 L614 450" stroke-width="1"/>
  </g>

